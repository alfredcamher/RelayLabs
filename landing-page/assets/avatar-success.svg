<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGradSuccess" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1020"/>
      <stop offset="100%" style="stop-color:#1a3320"/>
    </linearGradient>
    <linearGradient id="successGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#dcf763;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#dcf763;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGradSuccess)" rx="24"/>
  
  <!-- Stars/particles - more celebratory -->
  <circle cx="25" cy="35" r="1.5" fill="#dcf763" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="45" cy="155" r="1" fill="#4aabff" opacity="0.6"/>
  <circle cx="165" cy="30" r="1" fill="#dcf763" opacity="0.7"/>
  <circle cx="175" cy="115" r="1.5" fill="#4aabff" opacity="0.5">
    <animate attributeName="cy" values="115;110;115" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="35" cy="80" r="1" fill="#dcf763" opacity="0.6"/>
  
  <!-- Character Body -->
  <!-- Hood/Cloak -->
  <path d="M60 95 Q100 65 140 95 L145 170 Q100 180 55 170 Z" fill="#1e243a"/>
  <path d="M60 95 Q100 68 140 95 L138 100 Q100 75 62 100 Z" fill="#254530"/>
  
  <!-- Head/Face -->
  <ellipse cx="100" cy="90" rx="22" ry="25" fill="#1a1f33"/>
  <ellipse cx="100" cy="90" rx="18" ry="22" fill="#0c1020"/>
  
  <!-- Glowing Eyes (bright cyan) -->
  <ellipse cx="92" cy="86" rx="5" ry="3" fill="#00ffff">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="108" cy="86" rx="5" ry="3" fill="#00ffff">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Mustache -->
  <path d="M90 98 Q100 101 110 98" stroke="#4aabff" stroke-width="1.5" fill="none" opacity="0.8"/>
  
  <!-- Smile for success -->
  <path d="M92 105 Q100 110 108 105" stroke="#4aabff" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Success pose - thumbs up -->
  <ellipse cx="70" cy="135" rx="10" ry="7" fill="#1e243a"/>
  <rect x="118" y="125" width="8" height="20" fill="#1e243a" rx="4"/>
  <circle cx="122" cy="120" r="6" fill="#1e243a"/>
  <rect x="118" y="115" width="3" height="8" fill="#4aabff" rx="1.5"/>
  <rect x="123" y="115" width="3" height="8" fill="#4aabff" rx="1.5"/>
  <rect x="128" y="115" width="3" height="8" fill="#4aabff" rx="1.5"/>
  
  <!-- Success glow effect -->
  <circle cx="100" cy="120" r="40" fill="url(#successGlow)" opacity="0.4">
    <animate attributeName="r" values="35;45;35" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Success badge -->
  <circle cx="165" cy="165" r="12" fill="#dcf763"/>
  <path d="M160 165 L165 170 L172 160" stroke="#0c1020" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Flying confetti particles -->
  <rect x="40" cy="50" width="3" height="6" fill="#dcf763" opacity="0.8" transform="rotate(45 40 50)">
    <animate attributeName="cy" values="50;-10" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="150" cy="120" width="3" height="6" fill="#4aabff" opacity="0.7" transform="rotate(-30 150 120)">
    <animate attributeName="cy" values="120;-10" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0" dur="2.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="85" cy="180" width="3" height="6" fill="#dcf763" opacity="0.6" transform="rotate(60 85 180)">
    <animate attributeName="cy" values="180;-10" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="1.8s" repeatCount="indefinite"/>
  </rect>
  
  <!-- Sparkles -->
  <text x="55" y="60" font-size="12" fill="#dcf763" opacity="0.8">✦</text>
  <text x="145" y="90" font-size="10" fill="#4aabff" opacity="0.7">✦</text>
</svg>