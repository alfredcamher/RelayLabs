<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGradParty" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="50%" style="stop-color:#2a2050"/>
      <stop offset="100%" style="stop-color:#1a1030"/>
    </linearGradient>
    <radialGradient id="partyGlow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#dcf763;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#dcf763;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGradParty)" rx="24"/>
  
  <!-- Animated stars -->
  <circle cx="30" cy="40" r="2" fill="#ff6b9d" opacity="0.8">
    <animate attributeName="scale" values="1;1.5;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="165" cy="35" r="2" fill="#4ecdc4" opacity="0.8">
    <animate attributeName="scale" values="1;1.5;1" dur="0.7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="160" r="2" fill="#ffe66d" opacity="0.8">
    <animate attributeName="scale" values="1;1.5;1" dur="0.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="150" r="2" fill="#95e1d3" opacity="0.8">
    <animate attributeName="scale" values="1;1.5;1" dur="0.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="30" r="1.5" fill="#00ffff" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Character Body -->
  <!-- Hood/Cloak angled for celebration -->
  <path d="M55 100 Q100 55 145 100 L150 175 Q100 185 50 175 Z" fill="#2a2050"/>
  <path d="M55 100 Q100 60 145 100 L142 105 Q100 65 58 105 Z" fill="#3a3060"/>
  
  <!-- Head/Face -->
  <ellipse cx="100" cy="95" rx="20" ry="22" fill="#1a1f33"/>
  <ellipse cx="100" cy="95" rx="16" ry="19" fill="#0c1020"/>
  
  <!-- Glowing Eyes (bright green/lime) -->
  <ellipse cx="93" cy="91" rx="4" ry="2.5" fill="#dcf763">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="0.3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="107" cy="91" rx="4" ry="2.5" fill="#dcf763">
    <animate attributeName="opacity" values="0.9;1;0.9" dur="0.3s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Mustache -->
  <path d="M91 100 Q100 103 109 100" stroke="#4aabff" stroke-width="1.5" fill="none"/>
  
  <!-- Big smile -->
  <path d="M88 107 Q100 115 112 107" stroke="#dcf763" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- Celebration hands - raised -->
  <ellipse cx="55" cy="115" rx="8" ry="6" fill="#2a2050"/>
  <ellipse cx="145" cy="115" rx="8" ry="6" fill="#2a2050"/>
  
  <!-- Arms raised -->
  <path d="M55 115 Q40 90 50 70" stroke="#2a2050" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M145 115 Q160 90 150 70" stroke="#2a2050" stroke-width="6" fill