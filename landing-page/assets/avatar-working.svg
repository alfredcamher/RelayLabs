<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1020"/>
      <stop offset="100%" style="stop-color:#1a1f33"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#4aabff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4aabff;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGrad)" rx="24"/>
  
  <!-- Stars/particles -->
  <circle cx="30" cy="40" r="1" fill="#dcf763" opacity="0.6"/>
  <circle cx="160" cy="35" r="1.5" fill="#dcf763" opacity="0.4"/>
  <circle cx="175" cy="120" r="1" fill="#4aabff" opacity="0.5"/>
  <circle cx="45" cy="150" r="1" fill="#4aabff" opacity="0.4"/>
  
  <!-- Character Body -->
  <!-- Hood/Cloak -->
  <path d="M60 95 Q100 70 140 95 L145 170 Q100 180 55 170 Z" fill="#1e243a"/>
  <path d="M60 95 Q100 70 140 95 L138 100 Q100 78 62 100 Z" fill="#2a3250"/>
  
  <!-- Head/Face -->
  <ellipse cx="100" cy="95" rx="22" ry="25" fill="#1a1f33"/>
  <ellipse cx="100" cy="95" rx="18" ry="22" fill="#0c1020"/>
  
  <!-- Glowing Eyes (cyan) -->
  <ellipse cx="92" cy="92" rx="5" ry="3" fill="#00ffff">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="108" cy="92" rx="5" ry="3" fill="#00ffff">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Mustache -->
  <path d="M90 105 Q100 108 110 105" stroke="#4aabff" stroke-width="1.5" fill="none" opacity="0.7"/>
  
  <!-- Working pose - typing hands -->
  <ellipse cx="75" cy="140" rx="12" ry="8" fill="#1e243a"/>
  <ellipse cx="125" cy="140" rx="12" ry="8" fill="#1e243a"/>
  
  <!-- Keyboard/glow -->
  <rect x="85" y="152" width="30" height="8" fill="#2a3250" rx="2"/>
  <rect x="90" y="154" width="20" height="4" fill="#3a4260" rx="1"/>
  
  <!-- Green accent glow -->
  <circle cx="100" cy="155" r="25" fill="url(#glow)" opacity="0.3"/>
  
  <!-- Status indicator -->
  <circle cx="165" cy="165" r="8" fill="#dcf763"/>
  <text x="165" y="168" text-anchor="middle" font-size="8" fill="#0c1020" font-family="monospace">W</text>
  
  <!-- Working particles -->
  <circle cx="130" cy="145" r="1" fill="#dcf763" opacity="0.8">
    <animate attributeName="cy" values="145;135;145" dur="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="145" r="1" fill="#dcf763" opacity="0.8">
    <animate attributeName="cy" values="145;135;145" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>