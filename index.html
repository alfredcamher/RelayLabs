<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEO Autónomo - Sistema de Agentes IA | Relay Labs</title>
    <meta name="description" content="Aprende a construir un negocio con agentes IA que operan 24/7. Framework probado + Stack HKUDS.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ivory: #f6f7eb;
            --fiery-terracotta: #e94f37;
            --gunmetal: #393e41;
            --steel-blue: #3f88c5;
            --ocean-mist: #44bba4;
            --bg-dark: #1a1d1f;
            --bg-card: #25292c;
            --accent: var(--ocean-mist);
            --accent-glow: rgba(68, 187, 164, 0.3);
            --text: var(--ivory);
            --text-muted: #a0a5a8;
            --border: var(--gunmetal);
            --success: var(--ocean-mist);
            --gradient: linear-gradient(135deg, var(--steel-blue), var(--ocean-mist));
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            line-height: 1.6;
        }
        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(68, 187, 164, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(68, 187, 164, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }
        .bg-glow {
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(63, 136, 197, 0.1), transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(68, 187, 164, 0.08), transparent 50%);
            z-index: -1;
            animation: pulse 20s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* Technical text - IBM Plex Mono */
        .eyebrow, .timestamp, .mono {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(26, 29, 31, 0.95);
            backdrop-filter: blur(20px);
            z-index: 100;
        }
        nav { display: flex; justify-content: space-between; align-items: center; }
        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero { padding: 100px 0 60px; text-align: center; }
        .badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(233, 79, 55, 0.1);
            border: 1px solid var(--fiery-terracotta);
            border-radius: 50px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--fiery-terracotta);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .hero h1 {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 24px;
        }
        .hero h1 span {
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.15rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 40px;
        }
        .price-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .price-original {
            font-size: 1.5rem;
            text-decoration: line-through;
            color: var(--text-muted);
        }
        .price-now {
            font-size: 3rem;
            font-weight: 700;
            color: var(--ocean-mist);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 20px 50px;
            background: var(--gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 30px var(--accent-glow);
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 40px var(--accent-glow);
        }
        .guarantee {
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: 'Space Grotesk', sans-serif;
        }

        .features { padding: 80px 0; }
        .features h2 { text-align: center; font-size: 2rem; margin-bottom: 60px; }
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }
        .feature-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            transition: all 0.3s ease;
        }
        .feature-card:hover {
            border-color: var(--ocean-mist);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .feature-card h3 {
            font-size: 1.25rem;
            margin-bottom: 12px;
            color: var(--ocean-mist);
        }
        .feature-card p { color: var(--text-muted); }

        .stack {
            padding: 80px 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .stack h2 { text-align: center; font-size: 2rem; margin-bottom: 40px; }
        .stack-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            text-align: center;
        }
        .stack-item {
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }
        .stack-item h4 {
            color: var(--ocean-mist);
            margin-bottom: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.9rem;
        }

        .includes { padding: 80px 0; }
        .includes h2 { text-align: center; font-size: 2rem; margin-bottom: 40px; }
        .includes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .include-item {
            display: flex;
            align-items: center;
            gap: 12px
