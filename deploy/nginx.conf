# nginx.conf - Nginx Configuration for VPS Deployment
# Place in /etc/nginx/sites-available/ceo-autonomo
# Symlink: ln -s /etc/nginx/sites-available/ceo-autonomo /etc/nginx/sites-enabled/

upstream stripe_server {
    server 127.0.0.1:4242;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    
    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    
    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Contentioneer-Report-To always;

    # Logging
    access_log /var/log/nginx/ceo-autonomo-access.log;
    error_log /var/log/nginx/ceo-autonomo-error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    location / {
        proxy_pass http://stripe_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Health check endpoint (no SSL required)
    location /health {
        proxy_pass http://stripe_server/health;
        proxy_http_version 1.1;
        access_log off;
    }

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge {
        root /var/www/certbot;
    }
}
